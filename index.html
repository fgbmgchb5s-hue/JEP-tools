<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEP Mileage Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5efe8;
    --surface: #ffffff;
    --surface2: #f0ebe3;
    --border: #d8d0c8;
    --green: #1a6b1a;
    --green-dark: #145214;
    --green-dim: #1a6b1a18;
    --green-mid: #1a6b1a33;
    --green-row: #d6e8d6;
    --text: #1a1a1a;
    --text-dim: #555;
    --text-dimmer: #999;
    --red: #cc2200;
    --amber: #7a4500;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
    max-width: 520px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--green-mid);
  }

  .header img {
    height: 80px;
    width: auto;
    display: block;
    margin: 0 auto 8px;
  }

  .header p {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .home-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green-dim);
    border: 1px solid var(--green-mid);
    border-radius: 100px;
    padding: 5px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--green);
    margin-top: 10px;
    font-weight: 500;
  }

  .home-badge::before {
    content: '⌂';
    font-size: 14px;
  }

  .legs-container {
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
  }

  .leg {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .leg-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .leg-number {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--green);
    background: var(--green-dim);
    border: 1px solid var(--green-mid);
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-dimmer);
    cursor: pointer;
    font-size: 20px;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.2s;
  }

  .remove-btn:hover { color: var(--red); }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 8px;
  }

  input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus {
    border-color: var(--green);
    background: #fff;
  }

  input[type="text"]::placeholder {
    color: var(--text-dimmer);
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-add {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    flex: 1;
  }

  .btn-add:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  .btn-calculate {
    background: var(--green);
    color: #fff;
    flex: 2;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .btn-calculate:hover {
    background: var(--green-dark);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(26,107,26,0.25);
  }

  .btn-calculate:disabled {
    background: var(--border);
    color: var(--text-dimmer);
    transform: none;
    box-shadow: none;
    cursor: not-allowed;
  }

  .btn-reset {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dimmer);
    padding: 10px 13px;
  }

  .btn-reset:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    animation: slideIn 0.3s ease;
  }

  .results.visible { display: block; }

  .results-header {
    background: var(--green);
    color: #fff;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'DM Mono', monospace;
  }

  .results-body { padding: 4px 0; }

  .result-leg {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 16px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .result-leg:nth-child(odd) { background: var(--green-row); }
  .result-leg:last-child { border-bottom: none; }

  .result-leg-label {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    flex: 1;
    line-height: 1.5;
  }

  .result-leg-label span {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .result-leg-miles {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--amber);
    white-space: nowrap;
  }

  .result-total {
    padding: 12px 16px;
    background: var(--green-dim);
    border-top: 2px solid var(--green-mid);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .result-total-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'DM Mono', monospace;
  }

  .result-total-miles {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--green);
  }

  .copy-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px;
    background: var(--green);
    border: none;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: var(--green-dark); }

  .error-msg {
    background: #cc220010;
    border: 1px solid #cc220033;
    border-radius: 7px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    margin-bottom: 10px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .loading {
    text-align: center;
    padding: 16px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
  }

  .loading.visible { display: block; }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .home-leg {
    background: var(--green-dim);
    border: 1px solid var(--green-mid);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
  }

  .home-leg::before { content: '⌂'; font-size: 15px; }
</style>
</head>

<div class="results" id="results">
  <div class="results-header">Route Summary</div>
  <div class="results-body" id="resultLegs"></div>
  <div class="result-total">
    <div class="result-total-label">Total Miles</div>
    <div class="result-total-miles" id="totalMiles">—</div>
  </div>
  <button class="copy-btn" onclick="copyResults()">Copy to Clipboard</button>
</div>

<script>
const HOME = 'RH12 1ST, Horsham, UK';
let jobCount = 0;

function addJob() {
  jobCount++;
  const n = jobCount;
  const container = document.getElementById('legsContainer');
  const leg = document.createElement('div');
  leg.className = 'leg';
  leg.id = `leg-${n}`;
  leg.innerHTML = `
    <div class="leg-header">
      <span class="leg-number">JOB ${n}</span>
      <button class="remove-btn" onclick="removeLeg(${n})" title="Remove">×</button>
    </div>
    <div class="input-row">
      <input type="text" id="addr-${n}" placeholder="First line of address" autocomplete="off" />
      <input type="text" id="post-${n}" placeholder="Postcode" autocomplete="off" style="text-transform:uppercase" />
    </div>
  `;
  container.appendChild(leg);
  setTimeout(() => document.getElementById(`addr-${n}`).focus(), 50);
}

function removeLeg(n) {
  const el = document.getElementById(`leg-${n}`);
  if (el) el.remove();
}

function getActiveJobs() {
  const jobs = [];
  document.querySelectorAll('.leg').forEach(leg => {
    const id = leg.id.replace('leg-', '');
    const addr = document.getElementById(`addr-${id}`)?.value.trim();
    const post = document.getElementById(`post-${id}`)?.value.trim().toUpperCase();
    if (addr && post) jobs.push({ id, addr, post, full: `${addr}, ${post}, UK` });
  });
  return jobs;
}

async function geocode(address) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&countrycodes=gb`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const data = await res.json();
  if (!data.length) throw new Error(`Could not find: ${address}`);
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
}

async function getDrivingDistance(fromCoord, toCoord) {
  const url = `https://router.project-osrm.org/route/v1/driving/${fromCoord.lon},${fromCoord.lat};${toCoord.lon},${toCoord.lat}?overview=false`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.code !== 'Ok') throw new Error('Routing failed');
  return data.routes[0].distance / 1609.344;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

async function calculate() {
  hideError();
  document.getElementById('results').classList.remove('visible');
  const jobs = getActiveJobs();
  if (!jobs.length) { showError('Please add at least one job address.'); return; }
  for (const job of jobs) {
    if (job.post.length < 5) { showError(`Job ${job.id}: postcode "${job.post}" looks too short.`); return; }
  }

  document.getElementById('loading').classList.add('visible');
  document.getElementById('calcBtn').disabled = true;

  try {
    const homeCoord = await geocode(HOME);
    const jobCoords = [];
    for (const job of jobs) {
      const coord = await geocode(job.full);
      jobCoords.push({ ...job, coord });
    }

    const waypoints = [
      { label: 'Home (RH12 1ST)', coord: homeCoord },
      ...jobCoords.map(j => ({ label: `${j.addr}, ${j.post}`, coord: j.coord })),
      { label: 'Home (RH12 1ST)', coord: homeCoord }
    ];

    const rawLegs = [];
    let total = 0;
    for (let i = 0; i < waypoints.length - 1; i++) {
      const miles = await getDrivingDistance(waypoints[i].coord, waypoints[i+1].coord);
      rawLegs.push({ from: waypoints[i].label, to: waypoints[i+1].label, miles });
      total += miles;
    }

    // Combine last job leg with return home leg
    const legResults = rawLegs.slice(0, -1).map(l => ({ ...l, combined: false }));
    const lastIdx = legResults.length - 1;
    legResults[lastIdx] = {
      from: rawLegs[rawLegs.length - 2].from,
      to: rawLegs[rawLegs.length - 2].to,
      miles: rawLegs[rawLegs.length - 2].miles + rawLegs[rawLegs.length - 1].miles,
      combined: true
    };

    const resultLegs = document.getElementById('resultLegs');
    resultLegs.innerHTML = '';
    legResults.forEach((leg, i) => {
      const div = document.createElement('div');
      div.className = 'result-leg';
      const route = leg.combined ? `${leg.from} → ${leg.to} → Home` : `${leg.from} → ${leg.to}`;
      div.innerHTML = `
        <div class="result-leg-label">
          Leg ${i + 1}${leg.combined ? ' + Return' : ''}
          <span>${route}</span>
        </div>
        <div class="result-leg-miles">${leg.miles.toFixed(1)} mi</div>
      `;
      resultLegs.appendChild(div);
    });

    document.getElementById('totalMiles').textContent = `${total.toFixed(1)} mi`;
    document.getElementById('results').classList.add('visible');
    window._lastResults = { legResults, total };

  } catch (err) {
    showError(`Error: ${err.message}. Check addresses and try again.`);
  } finally {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('calcBtn').disabled = false;
  }
}

function copyResults() {
  if (!window._lastResults) return;
  const { legResults, total } = window._lastResults;
  let text = 'JEP Mileage Summary\n====================\n';
  legResults.forEach((leg, i) => {
    const label = leg.combined ? `Leg ${i+1} + Return` : `Leg ${i+1}`;
    const route = leg.combined ? `${leg.from} → ${leg.to} → Home` : `${leg.from} → ${leg.to}`;
    text += `${label}: ${route}: ${leg.miles.toFixed(1)} mi\n`;
  });
  text += `====================\nTotal: ${total.toFixed(1)} miles`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
  });
}

function resetAll() {
  document.getElementById('legsContainer').innerHTML = '';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('loading').classList.remove('visible');
  hideError();
  jobCount = 0;
  window._lastResults = null;
  addJob();
}

addJob();
</script>
</body>
</html>
